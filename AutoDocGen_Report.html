        {"main.py": "# main.py\n\n该文件是“CleanMyWechat”微信数据清理工具的入口模块，基于PyQt5构建了一套图形化界面，主要负责微信用户数据的扫描、配置管理和文件清理。其核心业务逻辑包括：通过配置窗口让用户选择微信数据目录、设置每个微信账号的清理参数（如清理天数、文件类型等），保存至 `config.json`；主窗口读取配置，按用户配置计算待清理的文件和目录，并使用多线程执行实际删除操作，同时通过进度条和状态提示反馈清理进展。\n\n---\n\n## 主要类/函数\n\n### 1. `class Window(QMainWindow)`\n所有窗口的基类，实现了窗口无边框、拖动、阴影、淡入淡出动画和状态提示功能。\n\n- **`mousePressEvent(self, event)`**  \n  输入: `QMouseEvent` 事件对象  \n  输出: 无  \n  作用: 捕获左键按下事件，记录拖动起始位置，使窗口可拖动。\n\n- **`mouseMoveEvent(self, QMouseEvent)`**  \n  输入: 鼠标移动事件  \n  输出: 无  \n  作用: 根据拖动偏移量移动窗口位置。\n\n- **`mouseReleaseEvent(self, QMouseEvent)`**  \n  输入: 鼠标释放事件  \n  输出: 无  \n  作用: 重置拖动标志。\n\n- **`_frame(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 设置窗口无边框、背景透明，并为主框架添加阴影效果。\n\n- **`doFadeIn(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 通过属性动画实现窗口淡入（透明度 0→1），持续 250ms。\n\n- **`doFadeOut(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 通过属性动画实现窗口淡出（透明度 1→0），动画结束后关闭窗口。\n\n- **`setWarninginfo(self, text)`**  \n  输入: `text` (str) 警告文本  \n  输出: 无  \n  作用: 在 `lab_info` 标签上显示红底警告样式信息。\n\n- **`setSuccessinfo(self, text)`**  \n  输入: `text` (str) 成功文本  \n  输出: 无  \n  作用: 在 `lab_info` 标签上显示绿底成功样式信息。\n\n---\n\n### 2. `class ConfigWindow(Window)`\n配置窗口，用于显示和编辑微信用户清理配置。\n\n- **`Signal_OneParameter = pyqtSignal(int)`**  \n  类型: 信号  \n  作用: 当配置保存成功时发送信号，通知主窗口更新状态。\n\n- **`_connect(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 连接 UI 组件的信号与槽函数（组合框切换、关闭按钮、选择目录按钮）。\n\n- **`open_file(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 弹出目录选择对话框，选择微信数据目录（WeChat Files 文件夹），验证后生成/更新 `config.json`。\n\n- **`save_config(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 调用 `update_config()` 保存当前用户配置，并触发淡出动画关闭窗口。\n\n- **`check_wechat_exists(self)`**  \n  输入: 无  \n  输出: `bool` （微信目录是否存在）  \n  作用: 通过 `selectVersion` 工具类扫描默认位置的微信安装路径，返回是否存在微信数据。\n\n- **`load_config(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 从 `config.json` 加载配置，填充下拉组合框和各个复选框/输入框，显示当前用户的设置。\n\n- **`refresh_ui(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 当下拉组合框选项改变时，更新 UI 显示对应账号的配置。\n\n- **`create_config(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 若 `config.json` 不存在，自动扫描默认微信位置，为每个用户生成默认配置并保存；若已存在则直接加载。\n\n- **`update_config(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 将 UI 中当前用户修改后的参数写回 `config.json`，并发射 `Signal_OneParameter` 信号。\n\n- **`__init__(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 构造函数，加载 UI 文件、初始化框架、连接信号、触发淡入显示并调用 `create_config()`。\n\n---\n\n### 3. `class MainWindow(Window)`\n程序的主窗口，提供开始清理、打开配置、关闭程序的功能。\n\n- **`deal_emit_slot(self, set_status)`**  \n  输入: `set_status` (int)  \n  输出: 无  \n  作用: 接收 `ConfigWindow` 的信号，若配置已存在则更新状态提示。\n\n- **`closeEvent(self, event)`**  \n  输入: `QCloseEvent`  \n  输出: 无  \n  作用: 重写关闭事件，直接退出程序。\n\n- **`eventFilter(self, object, event)`**  \n  输入: `object` (QObject), `event` (QEvent)  \n  输出: `bool`（是否过滤事件）  \n  作用: 拦截标签 `lab_close`、`lab_clean`、`lab_config` 的鼠标点击事件，分别执行关闭窗口、启动清理、打开配置窗口。\n\n- **`_eventfilter(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 为三个功能标签安装事件过滤器。\n\n- **`get_fileNum(self, path, day, picCacheCheck, fileCheck, picCheck, videoCheck, file_list, dir_list)`**  \n  输入:  \n  - `path`: 用户数据目录  \n  - `day`: 清理天数阈值  \n  - 四个布尔标志: 是否清理图片缓存、文件、图片、视频  \n  - `file_list`, `dir_list`: 待清理文件和目录列表的引用  \n  输出: 无  \n  作用: 根据清理类型，调用 `getPathFileNum` 扫描对应子目录，将超期的文件/目录路径追加到列表中。\n\n- **`pathFileDeal(self, now, day, path, file_list, dir_list)`**  \n  输入:  \n  - `now`: 当前时间  \n  - `day`: 天数阈值  \n  - `path`: 目录路径  \n  - `file_list`, `dir_list`: 列表引用  \n  输出: 无  \n  作用: 遍历指定路径下的文件，将最后修改时间早于 `now - day` 天的文件路径加入 `file_list`。\n\n- **`getPathFileNum(self, now, day, path_one, path_two, file_list, dir_list)`**  \n  输入: 两个路径（如 `Attachment` 和 `FileStorage/Image`）、时间参数、列表引用  \n  输出: 无  \n  作用: 分别处理两个路径：对 `path_one` 直接调用 `pathFileDeal`；对 `path_two` 按月份子目录结构处理，将整个月份目录或目录内文件加入清理列表。\n\n- **`__before_deadline(self, cyear, cmonth, td_year, td_month)`**  \n  输入: 年份/月份比较参数  \n  输出: `bool`  \n  作用: 判断给定年月是否在截止年月之前（用于月份目录级清理判断）。\n\n- **`callback(self, v)`**  \n  输入: `v` (int) 当前已处理文件/目录总数  \n  输出: 无  \n  作用: 计算进度百分比并更新进度条，若完成则显示成功信息。\n\n- **`justdoit(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 核心清理方法。读取 `config.json`，为每个启用的用户生成待清理文件/目录列表，创建 `multiDeleteThread` 线程并执行；若无文件需清理则显示警告。\n\n- **`show_config_window(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 创建 `ConfigWindow` 实例并显示，由定时器触发，用于首次启动时自动弹出配置窗口。\n\n- **`__init__(self)`**  \n  输入: 无  \n  输出: 无  \n  作用: 构造函数，加载主界面 UI、设置框架和事件过滤器、淡入显示、检查配置文件是否存在，若不存在则设置定时器延时弹出配置窗口。\n\n", "utils\\deleteThread.py": "# deleteThread.py\n\n该文件定义了一个基于 PyQt5 的 `deleteThread` 类，继承自 `QThread`，用于在独立线程中批量删除指定文件和目录，并通过信号实时通知主线程删除进度。核心业务逻辑是遍历传入的文件列表和目录列表，依次调用 `send2trash` 将目标移至回收站（而非直接删除），每处理一个项目更新并发射进度百分比信号，最后结束线程。\n\n### 主要类 / 函数\n\n#### `deleteThread` 类\n\n- **作用**：  \n  封装后台删除任务的线程对象，避免阻塞主线程的 UI 响应。使用 `QMutex` 确保同一时刻只有一个线程执行删除操作（类级互斥）。\n\n- **构造函数 `__init__(self, fileList, dirList)`**  \n  - 输入：  \n    - `fileList`：需要删除的文件路径列表（`list`）。  \n    - `dirList`：需要删除的目录路径列表（`list`）。  \n  - 输出：无。  \n  - 作用：初始化线程对象，保存待删除列表，计算总条目数 `fileNum`，并初始化进度计数器 `tempNum` 为 0。同时定义信号 `delete_proess_signal`（整型参数）用于发射进度百分比。\n\n- **方法 `run(self)`**  \n  - 输入：无（从实例属性获取数据）。  \n  - 输出：无。  \n  - 作用：  \n    1. 获取类级互斥锁 `qmut`，确保独占资源。  \n    2. 依次遍历 `fileList` 和 `dirList`，对每个路径调用 `send2trash` 将其移至回收站。  \n    3. 每处理一个条目，`tempNum` 加 1，计算 `proess = tempNum / fileNum * 100`，并通过 `delete_proess_signal.emit(int(proess))` 发射进度值。  \n    4. 遍历完成后释放互斥锁 `qmut.unlock()`，然后调用 `self.exec_()` 启动事件循环并正常结束线程。  \n    5. 若过程中抛出异常，捕获并打印错误信息（未解锁互斥锁将导致死锁，此为风险点）。\n\n> 💡 架构师建议：\n> 1. **互斥锁管理不当**：异常发生时，`try` 块内的 `qmut.unlock()` 不会被执行，导致互斥锁永久锁定。应使用 `finally` 块或在 `with` 语句中控制锁的获取与释放，例如：\n>    ```python\n>    qmut.lock()\n>    try:\n>        # 删除操作\n>    finally:\n>        qmut.unlock()\n>    ```\n> 2. **信号发射频率过高**：对于成百上千的文件，每次删除都发射信号可能引发 UI 线程过度重绘。建议按比例或固定间隔（如每处理 1% 或每 20 个文件）集中发射一次，提高性能。\n> 3. **安全性考虑**：`send2trash` 依赖系统回收站，可能不适用于所有平台或批量删除场景（如回收站容量限制）。若需强制删除并提升速度，可考虑直接使用 `shutil.rmtree` 和 `os.remove`，但在文档中需明确安全取舍。\n> 4. **类型转换问题**：`int(self.fileNum)` 冗余——`len()` 返回已是整数。可直接使用 `self.fileNum` 计算百分比。\n> 5. **线程结束方式**：`self.exec_()` 主要用于启动事件循环（如涉及信号槽跨线程），此处仅简单删除操作，直接调用 `return` 或让 `run` 正常退出即可，无需启动额外事件循环。当前代码在释放锁后立即调用 `exec_()`，会导致线程进入事件循环而不会真正退出，除非外部调用 `quit()`。建议移除该行，或改为 `self.quit()` 后 `exec()` 的处理模式。", "utils\\loadPath.py": "# loadPath.py\n\n该文件定义了一个名为`loadPath`的类，用于持久化存储和读取一个文件路径字符串。其核心业务逻辑是将用户选择的路径保存到Python解释器所在目录下的`path_file.txt`文件中，并在后续启动时加载该路径。该类主要服务于一个微信清理工具，用于记住上次的清理目标路径，避免用户重复选择。\n\n## 主要类与函数\n\n### `class loadPath`\n负责路径的持久化存储与加载。注意类名首字母小写，建议遵循PEP8规范改为`LoadPath`。\n\n#### `load(self) -> str`\n- **输入**：无\n- **输出**：返回存储的路径字符串。若文件不存在则返回空字符串。\n- **作用**：从Python解释器根目录下的`path_file.txt`中读取第一行作为路径。存在一个小问题：读取时使用了相对路径`'path_file.txt'`，而非之前构造的绝对路径`correct_syspath / 'path_file.txt'`，因此实际读取位置取决于当前工作目录，可能导致读取失败或读取到错误文件。\n\n#### `storage(self, path: str) -> None`\n- **输入**：`path` – 要保存的路径字符串\n- **输出**：无（`None`）\n- **作用**：将传入的路径写入Python解释器根目录下的`path_file.txt`文件中。写入时使用绝对路径`filepath`，与`load()`方法不一致。\n\n> 💡 **架构师建议：**\n> 1. **统一文件路径构造**：`load`方法中读取文件时使用了相对路径`'path_file.txt'`，而`storage`方法使用了`correct_syspath / 'path_file.txt'`的绝对路径。建议统一使用绝对路径，例如在`__init__`中计算一次并保存为实例属性。\n> 2. **增加异常处理**：读写文件时可能因权限、磁盘满等原因失败，应捕获`IOError`或`OSError`并给出提示或重试逻辑。\n> 3. **类名规范**：建议将类名改为`PathPersistence`或`LoadPath`（首字母大写），以符合PEP8类命名约定。\n> 4. **使用`pathlib`的统一操作**：`os.path.exists`可以替换为`Path(path).exists()`，保持风格一致。\n> 5. **缓存考虑**：如果`load`方法被频繁调用，可以考虑将已加载的路径缓存到实例变量中，避免重复读取文件。", "utils\\multiDeleteThread.py": "# multiDeleteThread.py\n\n该文件定义了一个基于 `QThread` 的多线程删除类，用于异步删除文件和目录。通过 `send2trash` 将文件移至回收站（而非永久删除），并使用共享计数器与信号实时通知主线程删除进度。\n\n## 主要类与函数\n\n### `class multiDeleteThread(QThread)`\n该类封装了一个删除线程，支持从传入的文件列表和目录列表中依次删除项目，并在每次删除后更新共享进度计数器并发射进度信号。\n\n**构造函数 `__init__(self, fileList, dirList, share_thread_arr)`**\n- **输入参数**：\n  - `fileList` (list[str])：待删除的文件路径列表。\n  - `dirList` (list[str])：待删除的目录路径列表。\n  - `share_thread_arr` (list[int])：长度为 1 的共享列表，用于在线程间原子地存储当前删除总数（`share_thread_arr[0]`）。\n- **输出**：无（初始化线程对象）。\n- **作用**：保存删除列表和共享进度计数器引用，供 `run()` 方法使用。\n\n**信号 `delete_process_signal = pyqtSignal(int)`**\n- **类型**：PyQt5 信号，发射一个整数。\n- **作用**：每当成功删除一个文件或目录后发射，整数参数表示当前已删除的总数（取自共享计数器）。\n\n**方法 `run(self)`**\n- **输入**：无（使用实例属性）。\n- **输出**：无（线程执行体）。\n- **作用**：\n  1. 遍历 `self.fileList`，对每个路径调用 `send2trash` 移至回收站。\n  2. 在锁保护下递增共享计数器 `self.share_thread_arr[0]`，并发射 `delete_process_signal`。\n  3. 对 `self.dirList` 重复相同操作。\n  4. 打印“一个线程执行结束了”以标记完成。\n  5. 捕获所有异常并打印错误（具体异常信息未细化处理）。\n\n**全局对象 `qmut = QMutex()`**\n- 作为模块级互斥锁，用于保护对共享计数器 `share_thread_arr[0]` 的并发访问。\n\n---\n\n> 💡 **架构师建议：**\n> 1. **锁粒度优化**：当前使用全局 `qmut` 对每个文件的计数器更新加锁，导致频繁的锁竞争。若删除任务量大，建议改用线程安全的原子计数器（如 `QAtomicInt`）或使用队列集中汇总进度，减少锁开销。\n> 2. **异常处理细化**：`run()` 中以 `try...except Exception` 捕获所有异常并仅打印，会吞掉错误。建议对不同的异常类型（如权限错误、路径不存在）分别处理，或将错误通过独立信号发射给主线程，提升健壮性。\n> 3. **进度计算逻辑**：共享计数器 `share_thread_arr[0]` 是列表的第一个整数元素，依赖调用方确保其正确初始化。建议改用 `list` 的 `append` 方式或传入 `int` 的引用（通过 `ctypes` 或 `Value`），当前设计在 Python 中易出错（如传入不可变类型）。\n> 4. **命名规范**：类名 `multiDeleteThread` 未遵循 PEP8（应为 `MultiDeleteThread`）。建议在重构时按 Python 规范命名，提高可读性。\n> 5. **资源释放**：注释中的 `self.exec_()` 被注释掉，若线程不需要事件循环，当前设计合理。但若未来需支持取消操作，则应检查线程的退出信号（如 `stop` 标志）并在循环中响应，避免强制终止。\n> 6. **进度一致性**：`fileList` 与 `dirList` 分开遍历，但进度计数连续累加。若主线程需要分别显示文件与目录的进度，可考虑发射两种不同的信号或附加类型标识。", "utils\\resources.py": "# resources.py\n\n该文件是由 PyQt5 资源编译器（RCC）自动生成的 Python 代码，用于将图标、图片等资源文件（SVG / PNG）以二进制形式嵌入到 Python 模块中，并提供 `qInitResources()` 和 `qCleanupResources()` 函数来实现资源的注册与卸载。文件遵循 Qt 资源系统规范，在导入时自动调用 `qInitResources()` 完成资源初始化，使应用程序可通过 `:/` 路径引用这些资源。\n\n## 主要数据与函数\n\n- **`qt_resource_data`**  \n  二进制数据段，包含了所有资源文件的原始字节码（如 SVG、PNG）。这是一个由 `b\"...\"` 定义的字节串，内部通过十六进制和转义序列编码了多个文件的内容。\n\n- **`qt_resource_name`**  \n  字节串元组，定义了每个资源在 Qt 资源系统中的路径名称。例如 `b\"\\x00\\x04\\x00\\x06\\xfa\\x5e\\x00\\x69\\x00\\x63\\x00\\x6f\\x00\\x6e\"` 对应路径 `/icon`，后续子名称组成了完整的资源标识符，如 `:/icon/微信_抗投诉服务器.svg`。\n\n- **`qt_resource_struct_v1` / `qt_resource_struct_v2`**  \n  资源结构体二进制数据，描述了资源的层级关系、偏移量与版本信息。`v2` 版本增加了时间戳字段，用于资源缓存校验。程序会根据当前 PyQt5 运行时版本自动选择 `v1` 或 `v2` 结构。\n\n- **`qt_version`**  \n  通过 `QtCore.qVersion().split('.')` 获取的 PyQt5 运行时版本号列表，用于决定使用哪种资源结构版本。\n\n- **`qInitResources()`**  \n  注册资源数据到 Qt 资源系统。内部调用 `QtCore.qRegisterResourceData()`，传入资源结构体、名称列表和二进制数据。  \n  **输入**：无（数据已在模块全局变量中定义）  \n  **输出**：无（注册后可通过 Qt 的 `:` 路径访问资源）\n\n- **`qCleanupResources()`**  \n  注销已注册的资源。内部调用 `QtCore.qUnregisterResourceData()`。  \n  **输入**：无  \n  **输出**：无\n\n- **`qInitResources()` 自动调用**  \n  文件末尾直接执行 `qInitResources()`，确保模块导入时资源自动可用。\n\n> 💡 架构师建议：该文件由工具自动生成，不应手动修改。若后续资源文件频繁更新，建议改用独立的 `.qrc` 文件并通过 `pyrcc5` 命令生成，以保持源码整洁。同时可考虑将资源加载逻辑与业务代码解耦，或将多语言图标资源按模块拆分，减少单文件体积。", "utils\\selectVersion.py": "# selectVersion.py\n\n该文件是 `CleanMyWechat` 项目中的核心模块之一，主要负责 **自动检测用户当前微信版本对应的数据存储目录**，并返回所有已登录微信账号的文件夹列表。它通过枚举桌面版、Windows 10 应用商店版、UWP 版以及注册表自定义路径等多种可能的数据存放位置，兼容不同版本的微信客户端，为后续的垃圾清理操作提供准确的文件路径入口。\n\n---\n\n## 主要类 / 函数\n\n### 1. `check_dir(file_path)`\n- **输入**：`file_path`（`str`）—— 待检查的父目录路径。\n- **输出**：`int`，若目录下包含 `'All Users'`、`'Applet'` 或 `'WMPF'` 子目录则返回 `0`，否则返回 `1`。\n- **功能**：快速判断给定路径是否包含微信的“非用户数据”目录，常用于区分“有效账户目录”与“系统或特殊目录”。\n\n### 2. `existing_user_config()`\n- **输入**：无。\n- **输出**：`dict`，键为微信 ID（`wechat_id`），值为该用户对应的完整配置字典；若 `config.json` 不存在则返回空字典 `{}`。\n- **功能**：从工作目录下的 `config.json` 文件中读取历史用户配置，用于后续的增量清理或用户选择界面。\n\n### 3. `read_registry_value(key_path, value_name)`\n- **输入**：\n  - `key_path`（`str`）—— 注册表键的完整路径（相对 `HKEY_CURRENT_USER`），例如 `\"software\\tencent\\wechat\"`。\n  - `value_name`（`str`）—— 要读取的注册表值名称。\n- **输出**：注册表值（类型不定，通常为 `str`），若读取失败则打印错误信息并返回 `None`。\n- **功能**：从 Windows 注册表中获取微信设置的 `FileSavePath`，以支持自定义目录的微信版本。\n\n### 4. `get_dir_name(filepath)`\n- **输入**：`filepath`（`str`）—— 微信数据根目录路径。\n- **输出**：`tuple`，包含两个列表：\n  - `dirlist`：有效的子目录完整路径列表（过滤了 `All Users`、`Applet`、`WMPF`）。\n  - `names`：对应的子目录名称列表。\n- **功能**：扫描微信数据根目录，返回所有以微信号（或随机字符串）命名的有效用户数据目录。\n\n### 5. `class selectVersion`\n- **核心方法**：`getAllPath(self)`\n  - **输入**：无（依赖当前登录用户 `getpass.getuser()` 及注册表）。\n  - **输出**：`tuple`，格式与 `get_dir_name` 一致：`(dirlist, names)`，若未找到任何微信数据目录则返回 `([], [])`。\n  - **功能**：按优先级依次尝试以下路径，返回第一个存在且有效的微信数据目录列表：\n    1. 桌面版：`C:\\Users\\<用户名>\\Documents\\WeChat Files`\n    2. Windows 10 商店版（forwin10）：`C:\\Users\\<用户名>\\AppData\\Local\\Packages\\TencentWeChatLimited.forWindows10_sdtnhv12zgd7a\\...\\WeChatAppStore Files`\n    3. UWP 版（foruwp）：`C:\\Users\\<用户名>\\AppData\\Local\\Packages\\TencentWeChatLimited.WeChatUWP_sdtnhv12zgd7a\\...\\WeChatAppStore Files`\n    4. 注册表自定义路径：读取 `HKEY_CURRENT_USER\\software\\tencent\\wechat` 下的 `FileSavePath`，若有效则拼接 `\\WeChat Files` 作为根目录。\n  - **作用**：统一封装不同微信版本、不同安装方式的目录发现逻辑，对外屏蔽底层差异。\n\n---\n\n> 💡 **架构师建议：**\n> \n> 1. **硬编码路径可配置化**：`getAllPath` 中的路径字典是硬编码的，建议抽离到外部配置文件（如 `paths.json`）或随主配置一起管理，便于后续新增版本或适配其他操作系统（如 macOS/Linux 的 Wine 环境）。\n> \n> 2. **check_dir 返回值语义不清晰**：返回 `0` 和 `1` 容易引起歧义，建议改用布尔值 `True/False` 或枚举类型（如 `IsSpecialDir`），并补充 docstring 明确含义。\n> \n> 3. **existing_user_config 缺少异常保护**：`json.load` 可能抛出 `json.JSONDecodeError`，且文件读写未使用 `with` 语句，建议改为 `with open(...) as f:` 并捕获异常，增强健壮性。\n> \n> 4. **read_registry_value 返回值类型不确定**：注册表值可能是 `REG_SZ` 或 `REG_EXPAND_SZ`，建议增加类型检查和转换（如 `os.path.expandvars`），避免路径变量未展开导致的问题。\n> \n> 5. **get_dir_name 的过滤逻辑与 check_dir 重复**：`check_dir` 用于检查父目录，而 `get_dir_name` 内部用不同方式过滤了相同的特殊项，建议统一为一个工具函数或直接复用 `check_dir` 的逻辑，减少维护成本。\n> \n> 6. **getAllPath 返回多个版本数据？**：当前策略是“找到第一个有效根目录即返回”，但用户可能同时使用不同版本的微信（如桌面版和商店版），建议考虑合并所有存在目录的结果，或至少通过日志记录未选择的版本目录，避免遗漏用户数据。"}
    </script>

    <script>
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        const dataStr = document.getElementById('docData').textContent;
        const docs = JSON.parse(dataStr);
        const fileListEl = document.getElementById('fileList');
        const contentEl = document.getElementById('content');
        
        let activeItem = null;

        Object.keys(docs).forEach(filePath => {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.textContent = filePath;
            div.onclick = () => {
                if (activeItem) activeItem.classList.remove('active');
                div.classList.add('active');
                activeItem = div;
                
                // 将 Markdown 渲染为 HTML
                contentEl.innerHTML = marked.parse(docs[filePath]);
            };
            fileListEl.appendChild(div);
        });

        // 默认选中第一个
        if(Object.keys(docs).length > 0) {
             fileListEl.firstChild.click();
        }
    </script>
</body>
